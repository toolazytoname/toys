<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 趣味节拍器 - 三个主题自由切换</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            min-height: 100vh;
            transition: all 0.3s ease;
            overflow-x: hidden;
        }
        
        /* 主题1 - 卡通熊风格 */
        .theme-bear {
            background: linear-gradient(135deg, #FFD166 0%, #F78CA2 100%);
        }
        
        .theme-bear .metronome-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .theme-bear .beat-item {
            background: linear-gradient(135deg, #FF9F4A 0%, #FF6B6B 100%);
            border: 4px solid #FFF;
            box-shadow: 0 10px 30px rgba(255, 111, 101, 0.4);
        }
        
        /* 主题2 - 可爱兔子风格 */
        .theme-rabbit {
            background: linear-gradient(135deg, #87E8DE 0%, #54D5EB 100%);
        }
        
        .theme-rabbit .metronome-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .theme-rabbit .beat-item {
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
            border: 4px solid #FFF;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }
        
        /* 主题3 - 音乐符号风格 */
        .theme-music {
            background: linear-gradient(135deg, #A8E6CF 0%, #DCEDC1 100%);
        }
        
        .theme-music .metronome-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        
        .theme-music .beat-item {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            border: 4px solid #FFF;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        
        .beat-item {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .beat-item.active {
            animation: pulse 0.3s ease;
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .beat-item.strong {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            font-size: 40px;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .control-btn {
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 18px;
        }
        
        .control-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .control-btn:active {
            transform: translateY(-1px);
        }
        
        .theme-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .theme-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .theme-btn.active {
            transform: scale(1.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .theme-btn.bear {
            background: linear-gradient(135deg, #FF9F4A 0%, #FF6B6B 100%);
        }
        
        .theme-btn.rabbit {
            background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
        }
        
        .theme-btn.music {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
        }
        
        .bpm-control {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .bpm-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
            border-radius: 5px;
            background: linear-gradient(90deg, #FF6B6B 0%, #4ECDC4 100%);
            outline: none;
            flex: 1;
        }
        
        .bpm-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 3px solid #FF6B6B;
            transition: all 0.2s ease;
        }
        
        .bpm-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .time-signature-btn {
            transition: all 0.2s ease;
            font-weight: 600;
        }
        
        .time-signature-btn.active {
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body class="theme-bear flex items-center justify-center p-4 relative">
    <!-- 主题切换按钮 -->
    <div class="theme-selector">
        <div class="theme-btn bear active" data-theme="bear">🐻</div>
        <div class="theme-btn rabbit" data-theme="rabbit">🐰</div>
        <div class="theme-btn music" data-theme="music">🎵</div>
    </div>

    <div class="metronome-container p-8 max-w-2xl w-full relative">
        <!-- 标题区域 -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold mb-2" id="main-title">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">🐻 小熊节拍器</span>
            </h1>
            <p class="text-gray-700 text-lg">跟着节拍快乐练习！</p>
        </div>

        <!-- 节拍显示区域 -->
        <div class="flex justify-center gap-4 mb-8 flex-wrap" id="beats-container">
            <!-- 节拍元素将通过JS动态生成 -->
        </div>

        <!-- BPM 控制区域 -->
        <div class="bg-gradient-to-r from-pink-100 to-orange-100 p-6 rounded-2xl mb-8">
            <div class="flex items-center justify-between mb-4">
                <label class="text-xl font-semibold text-gray-800">速度调节</label>
                <div class="flex items-center gap-3">
                    <span class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500" id="bpm-display">120</span>
                    <span class="text-gray-600 font-semibold">BPM</span>
                </div>
            </div>
            <div class="bpm-control">
                <button class="bg-white text-red-500 font-bold text-2xl w-10 h-10 rounded-full flex items-center justify-center shadow-lg" id="bpm-decrease">-</button>
                <input 
                    type="range" 
                    min="20" 
                    max="400" 
                    value="120" 
                    class="bpm-slider"
                    id="bpm-slider"
                >
                <button class="bg-white text-red-500 font-bold text-2xl w-10 h-10 rounded-full flex items-center justify-center shadow-lg" id="bpm-increase">+</button>
            </div>
            <div class="flex justify-between text-sm text-gray-600 mt-3">
                <span class="font-semibold">🐢 慢速</span>
                <span class="font-semibold">⚡ 快速</span>
            </div>
        </div>

        <!-- 节拍类型选择 -->
        <div class="mb-8">
            <label class="text-xl font-semibold text-gray-800 block mb-4">选择节拍</label>
            <div class="grid grid-cols-3 gap-4">
                <button class="time-signature-btn active bg-gradient-to-r from-red-500 to-orange-500 text-white py-4 px-6 rounded-xl" data-signature="4/4">
                    4/4 🎶
                </button>
                <button class="time-signature-btn bg-gradient-to-r from-blue-500 to-purple-500 text-white py-4 px-6 rounded-xl" data-signature="3/4">
                    3/4 🎵
                </button>
                <button class="time-signature-btn bg-gradient-to-r from-green-500 to-teal-500 text-white py-4 px-6 rounded-xl" data-signature="2/4">
                    2/4 🎼
                </button>
                <button class="time-signature-btn bg-gradient-to-r from-yellow-500 to-orange-500 text-white py-4 px-6 rounded-xl" data-signature="6/8">
                    6/8 🎷
                </button>
                <button class="time-signature-btn bg-gradient-to-r from-pink-500 to-red-500 text-white py-4 px-6 rounded-xl" data-signature="5/4">
                    5/4 🎺
                </button>
                <button class="time-signature-btn bg-gradient-to-r from-indigo-500 to-blue-500 text-white py-4 px-6 rounded-xl" data-signature="7/8">
                    7/8 🎸
                </button>
            </div>
        </div>

        <!-- 自定义节拍区域 -->
        <div class="bg-gradient-to-r from-blue-100 to-purple-100 p-6 rounded-2xl mb-8">
            <label class="text-xl font-semibold text-gray-800 block mb-3">自定义节拍</label>
            <div class="flex items-center gap-3">
                <input 
                    type="number" 
                    min="1" 
                    max="16" 
                    value="4" 
                    class="w-24 px-4 py-3 border-3 border-blue-300 rounded-xl text-center font-bold text-xl text-gray-800"
                    id="custom-beats"
                >
                <span class="text-3xl font-bold">/</span>
                <input 
                    type="number" 
                    min="1" 
                    max="16" 
                    value="4" 
                    class="w-24 px-4 py-3 border-3 border-blue-300 rounded-xl text-center font-bold text-xl text-gray-800"
                    id="custom-unit"
                >
                <button class="bg-gradient-to-r from-blue-500 to-purple-500 text-white py-3 px-6 rounded-xl font-semibold text-lg" id="apply-custom">
                    应用 ⚡
                </button>
            </div>
        </div>

        <!-- 主要控制按钮 -->
        <div class="flex justify-center gap-6 mb-8">
            <button class="control-btn bg-gradient-to-r from-gray-400 to-gray-600 text-white w-24 h-24 rounded-full flex items-center justify-center shadow-2xl" id="reset-btn">
                🔄
            </button>
            <button class="control-btn bg-gradient-to-r from-green-500 to-teal-500 text-white w-32 h-32 rounded-full flex items-center justify-center shadow-2xl text-2xl" id="start-stop-btn">
                ▶️ 开始
            </button>
            <button class="control-btn bg-gradient-to-r from-purple-500 to-pink-500 text-white w-24 h-24 rounded-full flex items-center justify-center shadow-2xl" id="sound-test-btn">
                🔊
            </button>
        </div>

        <!-- 状态栏 -->
        <div class="text-center text-gray-600 font-semibold" id="status-bar">
            就绪 - 等待开始
        </div>
    </div>

    <script>
        class Metronome {
            constructor() {
                this.bpm = 120;
                this.timeSignature = '4/4';
                this.isRunning = false;
                this.currentBeat = 0;
                this.intervalId = null;
                this.beatCount = 4;
                this.currentTheme = 'bear';
                
                // 主题配置
                this.themes = {
                    bear: {
                        title: '🐻 小熊节拍器',
                        beats: ['🐻', '🐰', '🐱', '🐶', '🐯', '🦁', '🐮', '🐷'],
                        colors: ['from-red-500 to-orange-500', 'from-orange-500 to-yellow-500', 'from-yellow-500 to-green-500', 'from-green-500 to-blue-500'],
                        bgClass: 'theme-bear'
                    },
                    rabbit: {
                        title: '🐰 兔子节拍器',
                        beats: ['🐰', '🐻', '🐶', '🐱', '🦊', '🐭', '🐹', '🐰'],
                        colors: ['from-blue-500 to-cyan-500', 'from-cyan-500 to-teal-500', 'from-teal-500 to-green-500', 'from-green-500 to-blue-500'],
                        bgClass: 'theme-rabbit'
                    },
                    music: {
                        title: '🎵 音乐节拍器',
                        beats: ['🎵', '🎶', '🎼', '🎹', '🎸', '🎺', '🎷', '🎻'],
                        colors: ['from-pink-500 to-red-500', 'from-red-500 to-orange-500', 'from-orange-500 to-yellow-500', 'from-yellow-500 to-green-500'],
                        bgClass: 'theme-music'
                    }
                };
                
                this.audioContext = null;
                this.strongSound = null;
                this.weakSound = null;
                
                this.initAudio();
                this.bindEvents();
                this.setTheme(this.currentTheme);
                this.updateBeats();
            }
            
            initAudio() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.audioContext = new AudioContext();
                
                this.strongSound = this.createSound(880, 0.15);
                this.weakSound = this.createSound(440, 0.15);
            }
            
            createSound(frequency, duration) {
                return () => {
                    if (this.audioContext.state === 'suspended') {
                        this.audioContext.resume();
                    }
                    
                    const oscillator = this.audioContext.createOscillator();
                    const gainNode = this.audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);
                    
                    oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
                    oscillator.type = 'sine';
                    
                    gainNode.gain.setValueAtTime(0.5, this.audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                    
                    oscillator.start(this.audioContext.currentTime);
                    oscillator.stop(this.audioContext.currentTime + duration);
                };
            }
            
            setTheme(theme) {
                this.currentTheme = theme;
                
                // 更新主题类
                document.body.className = `${this.themes[theme].bgClass} flex items-center justify-center p-4 relative`;
                
                // 更新标题
                document.getElementById('main-title').innerHTML = `
                    <span class="text-transparent bg-clip-text bg-gradient-to-r ${this.themes[theme].colors[0]}">
                        ${this.themes[theme].title}
                    </span>
                `;
                
                // 更新按钮样式
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.theme === theme) {
                        btn.classList.add('active');
                    }
                });
                
                this.updateBeats();
            }
            
            updateBeats() {
                const container = document.getElementById('beats-container');
                container.innerHTML = '';
                
                for (let i = 0; i < this.beatCount; i++) {
                    const beatItem = document.createElement('div');
                    beatItem.className = 'beat-item';
                    beatItem.innerHTML = this.themes[this.currentTheme].beats[i % this.themes[this.currentTheme].beats.length];
                    beatItem.dataset.beat = i;
                    
                    if (i === 0) {
                        beatItem.classList.add('strong');
                    }
                    
                    container.appendChild(beatItem);
                }
            }
            
            setBpm(bpm) {
                this.bpm = Math.max(20, Math.min(400, bpm));
                document.getElementById('bpm-display').textContent = this.bpm;
                document.getElementById('bpm-slider').value = this.bpm;
                
                if (this.isRunning) {
                    this.stop();
                    this.start();
                }
            }
            
            setTimeSignature(signature) {
                this.timeSignature = signature;
                const [beats, unit] = signature.split('/').map(Number);
                this.beatCount = beats;
                
                this.updateBeats();
                
                // 更新活动按钮
                document.querySelectorAll('.time-signature-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.signature === signature) {
                        btn.classList.add('active');
                    }
                });
                
                if (this.isRunning) {
                    this.currentBeat = 0;
                }
            }
            
            start() {
                if (this.isRunning) return;
                
                this.isRunning = true;
                document.getElementById('start-stop-btn').innerHTML = '⏸️ 暂停';
                document.getElementById('start-stop-btn').classList.remove('from-green-500', 'to-teal-500');
                document.getElementById('start-stop-btn').classList.add('from-yellow-500', 'to-orange-500');
                document.getElementById('status-bar').textContent = '正在运行 - 跟随节拍练习！';
                
                const interval = 60000 / this.bpm;
                this.intervalId = setInterval(() => this.tick(), interval);
            }
            
            stop() {
                if (!this.isRunning) return;
                
                this.isRunning = false;
                clearInterval(this.intervalId);
                document.getElementById('start-stop-btn').innerHTML = '▶️ 开始';
                document.getElementById('start-stop-btn').classList.remove('from-yellow-500', 'to-orange-500');
                document.getElementById('start-stop-btn').classList.add('from-green-500', 'to-teal-500');
                document.getElementById('status-bar').textContent = '已暂停 - 等待开始';
                
                // 清除所有活动节拍
                document.querySelectorAll('.beat-item').forEach(item => {
                    item.classList.remove('active');
                });
            }
            
            reset() {
                this.stop();
                this.currentBeat = 0;
                this.setBpm(120);
                this.setTimeSignature('4/4');
                document.getElementById('custom-beats').value = 4;
                document.getElementById('custom-unit').value = 4;
                document.getElementById('status-bar').textContent = '已重置 - 准备开始';
            }
            
            tick() {
                // 清除上一个节拍
                document.querySelectorAll('.beat-item').forEach(item => {
                    item.classList.remove('active');
                });
                
                // 设置当前节拍
                const beatElement = document.querySelector(`[data-beat="${this.currentBeat}"]`);
                if (beatElement) {
                    beatElement.classList.add('active');
                }
                
                // 播放声音
                if (this.currentBeat === 0) {
                    this.strongSound();
                } else {
                    this.weakSound();
                }
                
                this.currentBeat = (this.currentBeat + 1) % this.beatCount;
            }
            
            bindEvents() {
                // BPM 控制
                document.getElementById('bpm-slider').addEventListener('input', (e) => {
                    this.setBpm(parseInt(e.target.value));
                });
                
                document.getElementById('bpm-increase').addEventListener('click', () => {
                    this.setBpm(this.bpm + 10);
                });
                
                document.getElementById('bpm-decrease').addEventListener('click', () => {
                    this.setBpm(this.bpm - 10);
                });
                
                // 开始/暂停
                document.getElementById('start-stop-btn').addEventListener('click', () => {
                    if (this.isRunning) {
                        this.stop();
                    } else {
                        this.start();
                    }
                });
                
                // 重置
                document.getElementById('reset-btn').addEventListener('click', () => {
                    this.reset();
                });
                
                // 节拍类型
                document.querySelectorAll('.time-signature-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.setTimeSignature(btn.dataset.signature);
                    });
                });
                
                // 自定义节拍
                document.getElementById('apply-custom').addEventListener('click', () => {
                    const beats = parseInt(document.getElementById('custom-beats').value);
                    const unit = parseInt(document.getElementById('custom-unit').value);
                    
                    if (isNaN(beats) || isNaN(unit) || beats < 1 || beats > 16 || unit < 1 || unit > 16) {
                        alert('请输入有效的节拍数字 (1-16)');
                        return;
                    }
                    
                    this.setTimeSignature(`${beats}/${unit}`);
                });
                
                // 主题切换
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.setTheme(btn.dataset.theme);
                    });
                });
                
                // 声音测试
                document.getElementById('sound-test-btn').addEventListener('click', () => {
                    this.strongSound();
                    setTimeout(() => this.weakSound(), 300);
                });
            }
        }
        
        // 初始化节拍器
        document.addEventListener('DOMContentLoaded', () => {
            window.metronome = new Metronome();
        });
    </script>
</body>
</html>
